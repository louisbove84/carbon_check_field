<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="carbon_check_field">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CarbonCheck Field</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Load order: config (sets GOOGLE_MAPS_API_KEY) → Maps JS → flutter_bootstrap.
    If flutter_bootstrap ran in parallel (async), Dart could read the key before it existed.
    Production: Vercel env CARBONCHECK_GOOGLE_MAPS_API_KEY; GCP key must allow this origin.
  -->
  <script>
    function startFlutter() {
      var boot = document.createElement('script');
      boot.src = 'flutter_bootstrap.js';
      boot.async = true;
      document.body.appendChild(boot);
    }

    function loadMapsThenFlutter() {
      var mapsKey = typeof GOOGLE_MAPS_API_KEY !== 'undefined' ? GOOGLE_MAPS_API_KEY : '';
      mapsKey = typeof mapsKey === 'string' ? mapsKey.trim() : '';
      if (mapsKey) {
        var script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(mapsKey);
        script.onload = startFlutter;
        script.onerror = function () {
          console.error('Failed to load Google Maps JavaScript API');
          startFlutter();
        };
        document.head.appendChild(script);
      } else {
        console.error(
          'GOOGLE_MAPS_API_KEY missing. Local: web/config.local.js. ' +
          'Vercel: set CARBONCHECK_GOOGLE_MAPS_API_KEY and allow this domain on the key.'
        );
        startFlutter();
      }
    }

    function loadConfigScript(src, onLoad, onError) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = onLoad;
      s.onerror = onError || function () {
        console.error('Failed to load ' + src);
        loadMapsThenFlutter();
      };
      document.head.appendChild(s);
    }

    var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (isLocal) {
      loadConfigScript('/config.local.js', loadMapsThenFlutter, loadMapsThenFlutter);
    } else {
      loadConfigScript('/api/carboncheck-config', loadMapsThenFlutter);
    }
  </script>
</head>
<body>
</body>
</html>
