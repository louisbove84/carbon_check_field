name: Deploy to Vercel

on:
  push:
    branches:
      - main

# Use Node 24 for JS-based actions (checkout, etc.); see GitHub Actions changelog.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter web
        run: |
          set -euxo pipefail
          flutter --version
          flutter pub get
          # pubspec lists .env as an asset; real .env is gitignored — bundle needs a file on CI
          if [ ! -f .env ]; then cp .env.example .env; fi
          # CI: avoid wasm dry-run noise / possible non-zero exits on newer Flutter
          flutter build web --release --no-wasm-dry-run
          test -d build/web
          test -f build/web/index.html

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json << EOF
          {
            "orgId": "${VERCEL_ORG_ID}",
            "projectId": "${VERCEL_PROJECT_ID}"
          }
          EOF
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify Flutter output for Vercel upload
        run: |
          test -f build/web/index.html
          echo "build/web files: $(find build/web -type f | wc -l)"

      - name: Deploy to Vercel
        run: >
          vercel deploy --prod --yes
          --token $VERCEL_TOKEN
          --scope $VERCEL_ORG_ID
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
